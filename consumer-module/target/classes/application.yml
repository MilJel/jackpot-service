spring:
  application:
    name: jackpot-consumer

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: jackpot-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.jackpot.consumer.dto.BetMessage
        spring.json.use.type.headers: false

  datasource:
    url: jdbc:h2:file:./db/jackpotdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
#    url: jdbc:h2:mem:jackpotdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

kafka:
  topic: jackpot-bets

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
